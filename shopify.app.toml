# =============================================================
# Shopify app configuration.
# File: /shopify.app.toml
#
# BEFORE you deploy, replace the 3 placeholders below:
#   1) client_id        → Partner Dashboard → your app → "Client ID"
#   2) <YOUR-APP>        → your Vercel production domain (appears 4×)
#   3) (scopes are already set for this app)
#
# Then run:  shopify app deploy
# (Tip: `shopify app config link` can fill client_id for you by
#  selecting your existing app, then re-edit the URLs below.)
# =============================================================

client_id = "f4ec90b678d46e8ffb3e586037c4f101"
name = "Reviews App by DiziGroww"
handle = "review-lovely-lady"
application_url = "https://review-lovely-lady.vercel.app"
embedded = true

[access_scopes]
# Needed because the "Generate" page reads your product catalog.
scopes = "write_products,read_products"

[auth]
redirect_urls = [
  "https://review-lovely-lady.vercel.app/auth/callback",
  "https://review-lovely-lady.vercel.app/auth/shopify/callback",
  "https://review-lovely-lady.vercel.app/api/auth/callback"
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [webhooks.privacy_compliance]
  customer_data_request_url = "https://review-lovely-lady.vercel.app/webhooks/customers/data_request"
  customer_deletion_url     = "https://review-lovely-lady.vercel.app/webhooks/customers/redact"
  shop_deletion_url         = "https://review-lovely-lady.vercel.app/webhooks/shop/redact"

[pos]
embedded = false

[build]
